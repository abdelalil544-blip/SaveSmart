<div class="min-h-screen bg-slate-50/50">

  <!-- Top Navigation Bar -->
  <header class="sticky top-0 z-50 border-b border-slate-200/60 bg-white/80 backdrop-blur-xl">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-6 sm:px-8 lg:px-10">

      <!-- Logo & Nav -->
      <div class="flex items-center gap-8">

        <!-- Logo -->
        <div class="flex items-center gap-2.5 cursor-pointer group">
          <div class="flex h-9 w-9 items-center justify-center rounded-xl shadow-sm transition group-hover:scale-105"
               style="background:linear-gradient(135deg,#0f1e3c,#1e40af)">
            <span class="text-xs font-black tracking-tighter text-white">SS</span>
          </div>
          <span class="text-base font-black tracking-tight" style="color:#0f1e3c">SaveSmart</span>
        </div>

        <div class="hidden h-6 w-px bg-slate-200 lg:block"></div>

        <!-- Nav Links -->
        <nav class="hidden items-center gap-1 lg:flex">
          <a routerLink="/app/dashboard"
             routerLinkActive="bg-blue-50 text-blue-800 ring-1 ring-blue-100"
             class="rounded-xl px-3.5 py-2 text-[11px] font-black uppercase tracking-widest text-slate-400 transition-all hover:bg-blue-50/60 hover:text-blue-700">
            Dashboard
          </a>
          <a routerLink="/app/budgets"
             routerLinkActive="bg-blue-50 text-blue-800 ring-1 ring-blue-100"
             class="rounded-xl px-3.5 py-2 text-[11px] font-black uppercase tracking-widest text-slate-400 transition-all hover:bg-blue-50/60 hover:text-blue-700">
            Budgets
          </a>
          <a routerLink="/app/goals"
             routerLinkActive="bg-blue-50 text-blue-800 ring-1 ring-blue-100"
             class="rounded-xl px-3.5 py-2 text-[11px] font-black uppercase tracking-widest text-slate-400 transition-all hover:bg-blue-50/60 hover:text-blue-700">
            Goals
          </a>
          <a routerLink="/app/timeline"
             routerLinkActive="bg-blue-50 text-blue-800 ring-1 ring-blue-100"
             class="rounded-xl px-3.5 py-2 text-[11px] font-black uppercase tracking-widest text-slate-400 transition-all hover:bg-blue-50/60 hover:text-blue-700">
            Timeline
          </a>
          <a routerLink="/app/categories"
             routerLinkActive="bg-blue-50 text-blue-800 ring-1 ring-blue-100"
             class="rounded-xl px-3.5 py-2 text-[11px] font-black uppercase tracking-widest text-slate-400 transition-all hover:bg-blue-50/60 hover:text-blue-700">
            Categories
          </a>
          <a routerLink="/app/profile"
             routerLinkActive="bg-blue-50 text-blue-800 ring-1 ring-blue-100"
             class="rounded-xl px-3.5 py-2 text-[11px] font-black uppercase tracking-widest text-slate-400 transition-all hover:bg-blue-50/60 hover:text-blue-700">
            Profile
          </a>
        </nav>
      </div>

      <!-- Right Actions -->
      <div class="flex items-center gap-2">

        <!-- Avatar -->
        <a routerLink="/app/profile"
           class="flex h-9 w-9 items-center justify-center rounded-full border-2 border-blue-100 bg-blue-50 shadow-sm transition hover:border-blue-300">
          <span class="text-[10px] font-black text-blue-800">{{ userInitials() }}</span>
        </a>

        <!-- Divider -->
        <div class="mx-1 h-6 w-px bg-slate-200"></div>

        <!-- Logout -->
        <button (click)="logout()"
                class="flex items-center gap-2 rounded-xl border border-rose-100 bg-rose-50 px-3.5 py-2 text-[11px] font-black uppercase tracking-widest text-rose-500 shadow-sm transition hover:bg-rose-100 hover:border-rose-200 hover:text-rose-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" />
          </svg>
          <span class="hidden sm:inline">Sign Out</span>
        </button>

      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="mx-auto max-w-7xl px-6 py-12 sm:px-8 lg:px-10">
    <router-outlet />
  </main>

</div>
