<div class="min-h-screen bg-slate-50/50">
  <!-- Top Navigation Bar -->
  <header class="sticky top-0 z-50 border-b border-slate-200/60 bg-white/70 backdrop-blur-xl">
    <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-6 sm:px-8 lg:px-10">
      <!-- Logo & Branding -->
      <div class="flex items-center gap-10">
        <div class="flex items-center gap-3 group cursor-pointer">
          <div
            class="flex h-10 w-10 items-center justify-center rounded-xl premium-gradient shadow-lg shadow-indigo-500/30 group-hover:scale-105 transition-transform">
            <span class="font-['Outfit'] text-sm font-black tracking-tighter text-white">SS</span>
          </div>
          <h1
            class="saas-heading text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-indigo-600">
            SaveSmart</h1>
        </div>

        <div class="hidden h-8 w-px bg-slate-200 lg:block"></div>

        <!-- Main Navigation Links -->
        <nav class="hidden items-center gap-2 lg:flex">
          <a routerLink="/app/dashboard" routerLinkActive="bg-white text-indigo-600 shadow-sm ring-1 ring-slate-200"
            class="rounded-xl px-4 py-2 text-xs font-bold text-slate-500 transition-all hover:text-indigo-600 hover:bg-white/50">
            Dashboard
          </a>
          <a routerLink="/app/budgets" routerLinkActive="bg-white text-indigo-600 shadow-sm ring-1 ring-slate-200"
            class="rounded-xl px-4 py-2 text-xs font-bold text-slate-500 transition-all hover:text-indigo-600 hover:bg-white/50">
            Budgets
          </a>
          <a routerLink="/app/goals" routerLinkActive="bg-white text-indigo-600 shadow-sm ring-1 ring-slate-200"
            class="rounded-xl px-4 py-2 text-xs font-bold text-slate-500 transition-all hover:text-indigo-600 hover:bg-white/50">
            Goals
          </a>
          <a routerLink="/app/timeline" routerLinkActive="bg-white text-indigo-600 shadow-sm ring-1 ring-slate-200"
            class="rounded-xl px-4 py-2 text-xs font-bold text-slate-500 transition-all hover:text-indigo-600 hover:bg-white/50">
            Timeline
          </a>
          <a routerLink="/app/categories" routerLinkActive="bg-white text-indigo-600 shadow-sm ring-1 ring-slate-200"
            class="rounded-xl px-4 py-2 text-xs font-bold text-slate-500 transition-all hover:text-indigo-600 hover:bg-white/50">
            Categories
          </a>
          <a routerLink="/app/profile" routerLinkActive="bg-white text-indigo-600 shadow-sm ring-1 ring-slate-200"
            class="rounded-xl px-4 py-2 text-xs font-bold text-slate-500 transition-all hover:text-indigo-600 hover:bg-white/50">
            Profile
          </a>
        </nav>
      </div>

      <!-- Quick Actions & Profile -->
      <div class="flex items-center gap-6">
        <button
          class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white shadow-sm transition-all hover:bg-slate-50 hover:border-slate-300">
          <span class="text-slate-500 text-lg">🔔</span>
        </button>
        <a routerLink="/app/profile"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 ring-2 ring-indigo-50 shadow-inner group cursor-pointer hover:ring-indigo-200 transition-all">
          <span class="text-[10px] font-black text-slate-600 group-hover:text-indigo-600">{{ userInitials() }}</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Content Area -->
  <main class="mx-auto max-w-7xl px-6 py-12 sm:px-8 lg:px-10">
    <router-outlet />
  </main>
</div>
