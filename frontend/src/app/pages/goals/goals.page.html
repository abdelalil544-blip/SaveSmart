<div class="space-y-8">
  <header class="flex flex-col justify-between gap-6 sm:flex-row sm:items-end">
    <div class="space-y-1">
      <h1 class="saas-heading text-3xl text-slate-900">Wealth Milestones</h1>
      <p class="text-sm text-slate-500">Track long-term objectives and capital accumulation.</p>
    </div>
    <div class="glass-card flex items-center gap-4 p-4">
      <div
        class="h-10 w-10 shrink-0 rounded-lg bg-emerald-50 flex items-center justify-center text-emerald-600 text-lg">
        ✓
      </div>
      <div class="space-y-0.5">
        <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Total Secured</p>
        <p class="saas-heading text-xl text-slate-900">€3,820</p>
      </div>
    </div>
  </header>

  <section class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    @for (goal of goals; track goal.title) {
    <div class="glass-card hover-lift flex flex-col p-6">
      <div class="flex items-start justify-between">
        <h3 class="saas-heading text-lg text-slate-900">{{ goal.title }}</h3>
        <span
          class="rounded px-2 py-0.5 text-[10px] font-bold uppercase tracking-widest bg-slate-100 text-slate-600 ring-1 ring-slate-200">
          {{ goal.status }}
        </span>
      </div>

      <div class="mt-1 flex items-center gap-1.5 text-slate-400">
        <span class="text-[10px] font-bold uppercase tracking-widest">Deadline</span>
        <span class="text-[10px] font-bold text-slate-600">{{ goal.due }}</span>
      </div>

      <div class="mt-8 grid grid-cols-2 gap-4 border-t border-slate-50 pt-6">
        <div class="space-y-1">
          <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Secured</p>
          <p class="saas-heading text-lg text-slate-900">{{ goal.saved }}</p>
        </div>
        <div class="space-y-1 border-l border-slate-50 pl-4">
          <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Objective</p>
          <p class="saas-heading text-lg text-slate-900">{{ goal.target }}</p>
        </div>
      </div>

      <div class="mt-6 space-y-2">
        <div class="flex items-center justify-between">
          <span class="text-[10px] font-bold uppercase tracking-widest text-indigo-600">Completion</span>
          <span class="text-[10px] font-bold text-slate-900">{{ getPercent(goal) }}%</span>
        </div>
        <div class="h-2 w-full overflow-hidden rounded-full bg-slate-100">
          <div class="h-full rounded-full bg-indigo-600 transition-all duration-1000"
            [style.width.%]="getPercent(goal)"></div>
        </div>
      </div>

      <div class="mt-8 pt-2">
        <button
          class="w-full rounded-lg border border-slate-200 bg-white py-2.5 text-xs font-bold text-slate-600 transition-all hover:bg-slate-50 hover:text-slate-900">
          Modify Allocation
        </button>
      </div>
    </div>
    }

    <!-- Add New Goal Placeholder -->
    <button
      class="flex min-h-[300px] flex-col items-center justify-center gap-4 rounded-xl border-2 border-dashed border-slate-200 bg-slate-50/50 p-6 transition-all hover:bg-white hover:border-indigo-300 group">
      <div
        class="flex h-12 w-12 items-center justify-center rounded-full bg-slate-100 group-hover:bg-indigo-50 transition-colors">
        <span class="text-2xl text-slate-400 group-hover:text-indigo-600">+</span>
      </div>
      <div class="text-center">
        <p class="text-sm font-bold text-slate-600 group-hover:text-slate-900">Initialize New Milestone</p>
        <p class="mt-1 text-xs text-slate-400">Set a new long-term financial destination.</p>
      </div>
    </button>
  </section>
</div>
