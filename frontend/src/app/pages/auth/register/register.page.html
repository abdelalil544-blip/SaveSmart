<div class="min-h-screen flex flex-col items-center justify-center p-6" style="background:linear-gradient(160deg,#f0f4ff 0%,#f8fafc 50%,#eef2ff 100%)">
  <div class="w-full max-w-lg">

    <!-- Identity -->
    <div class="mb-10 text-center">
      <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-xl shadow-lg transition hover:scale-105"
           style="background:linear-gradient(135deg,#0f1e3c,#1e40af)">
        <span class="text-sm font-black tracking-tighter text-white">SS</span>
      </div>
      <h1 class="mt-5 text-2xl font-black tracking-tight" style="color:#0f1e3c">Create Account</h1>
      <p class="mt-1.5 text-xs font-medium uppercase tracking-widest text-slate-400">Create your SaveSmart account</p>
    </div>

    <!-- Card -->
    <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-xl">

      <!-- Card Header -->
      <div class="border-b border-blue-900/20 px-8 py-5" style="background:linear-gradient(to right,#0f1e3c,#1a3260)">
        <h2 class="text-sm font-black uppercase tracking-widest text-blue-100">Create Account</h2>
        <p class="mt-0.5 text-[10px] font-bold uppercase tracking-widest text-blue-400">Get started</p>
      </div>

      <div class="px-8 py-8">

        <!-- Feedback -->
        @if (errorMessage()) {
        <div class="mb-6 flex items-start gap-2.5 rounded-xl border border-rose-100 bg-rose-50 px-4 py-3 text-xs font-bold text-rose-700 ring-1 ring-rose-100">
          <span class="mt-0.5 flex h-4 w-4 shrink-0 items-center justify-center rounded-full bg-rose-200 text-[9px]">!</span>
          {{ errorMessage() }}
        </div>
        }
        @if (successMessage()) {
        <div class="mb-6 flex items-start gap-2.5 rounded-xl border border-emerald-100 bg-emerald-50 px-4 py-3 text-xs font-bold text-emerald-700 ring-1 ring-emerald-100">
          <span class="mt-0.5 flex h-4 w-4 shrink-0 items-center justify-center rounded-full bg-emerald-200 text-[9px]">✓</span>
          {{ successMessage() }}
        </div>
        }

        <!-- Form -->
        <form class="space-y-5" [formGroup]="registerForm" (ngSubmit)="submitRegister()">

          <!-- Name row -->
          <div class="grid gap-4 sm:grid-cols-2">
            <div class="space-y-1.5">
              <label class="ml-0.5 text-[10px] font-black uppercase tracking-widest text-slate-400">First Name</label>
              <input type="text" formControlName="firstName"
                     class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-semibold text-slate-800 placeholder-slate-300 outline-none transition focus:border-blue-300 focus:bg-white focus:ring-2 focus:ring-blue-50"
                     placeholder="John" />
            </div>
            <div class="space-y-1.5">
              <label class="ml-0.5 text-[10px] font-black uppercase tracking-widest text-slate-400">Last Name</label>
              <input type="text" formControlName="lastName"
                     class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-semibold text-slate-800 placeholder-slate-300 outline-none transition focus:border-blue-300 focus:bg-white focus:ring-2 focus:ring-blue-50"
                     placeholder="Doe" />
            </div>
          </div>

          <!-- Email -->
          <div class="space-y-1.5">
            <label class="ml-0.5 text-[10px] font-black uppercase tracking-widest text-slate-400">Email</label>
            <input type="email" formControlName="email"
                   class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-semibold text-slate-800 placeholder-slate-300 outline-none transition focus:border-blue-300 focus:bg-white focus:ring-2 focus:ring-blue-50"
                   placeholder="name@domain.com" />
          </div>

          <!-- Password -->
          <div class="space-y-1.5">
            <label class="ml-0.5 text-[10px] font-black uppercase tracking-widest text-slate-400">Password</label>
            <input type="password" formControlName="password"
                   class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-semibold text-slate-800 placeholder-slate-300 outline-none transition focus:border-blue-300 focus:bg-white focus:ring-2 focus:ring-blue-50"
                   placeholder="Min. 8 characters" />
          </div>

          <!-- Phone -->
          <div class="space-y-1.5">
            <div class="flex items-center justify-between">
              <label class="ml-0.5 text-[10px] font-black uppercase tracking-widest text-slate-400">Phone (optional)</label>
              <span class="text-[10px] font-black uppercase tracking-widest text-slate-300">Optional</span>
            </div>
            <input type="tel" formControlName="phoneNumber"
                   class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm font-semibold text-slate-800 placeholder-slate-300 outline-none transition focus:border-blue-300 focus:bg-white focus:ring-2 focus:ring-blue-50"
                   placeholder="+33 000 000 000" />
          </div>

          <!-- Submit -->
          <button type="submit" [disabled]="isLoading()"
                  class="mt-2 h-11 w-full rounded-xl text-xs font-black uppercase tracking-widest text-white shadow-sm transition hover:opacity-90 active:scale-95 disabled:opacity-40"
                  style="background:linear-gradient(135deg,#0f1e3c,#1e40af)">
            {{ isLoading() ? 'Deploying…' : 'Create Account' }}
          </button>

        </form>

        <!-- Sign in link -->
        <div class="mt-6 border-t border-slate-50 pt-6 text-center">
          <p class="text-xs font-semibold text-slate-400">
            Already have an account?
            <a class="font-black text-blue-600 transition hover:text-blue-800" routerLink="/login">Sign In</a>
          </p>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <p class="mt-8 text-center text-[9px] font-black uppercase tracking-widest text-slate-300">
      © 2026 SaveSmart · Secure connection
    </p>

  </div>
</div>
