spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/Save_Smart_db
spring.datasource.username=postgres
spring.datasource.password=\
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

server.port=8081
logging.level.com.smart_delivery_management.smartlogi_delivery=DEBUG
logging.level.org.hibernate.SQL=DEBUG

jwt.secret=\
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=\
spring.security.oauth2.client.registration.google.client-secret=\
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Frontend redirect after OAuth2 login (set to your SPA route)
app.oauth2.redirect-uri=http://localhost:4200/oauth2/redirect
