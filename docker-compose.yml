services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: Save_Smart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: latifi-2001
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/Save_Smart_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: latifi-2001
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: 8fK#92kLm!xPq7ZrT5wYv@3B1cD9eF0X
      JWT_EXPIRATION_MS: "3600000"
      JWT_REFRESH_EXPIRATION_MS: "604800000"
      APP_OAUTH2_REDIRECT_URI: http://localhost:8080/oauth2/redirect
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: "524834586493-uvbe4qauial256ummsc9gtfv1n1sjcmd.apps.googleusercontent.com"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: "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"
    depends_on:
      - db
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
